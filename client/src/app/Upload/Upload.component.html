<!-- src/app/uploadfile/uploadfile.component.html -->
<div class="card" style="padding:20px;">
  <h3>Upload files</h3>

  <p-fileUpload
    name="myFiles"
    url="http://localhost:3001/upload"
    [auto]="false"
    [multiple]="true"
    chooseLabel="Choose Files"
    uploadLabel="Upload"
    cancelLabel="Cancel"
    (onUpload)="onUpload($event)">
  </p-fileUpload>
</div>
